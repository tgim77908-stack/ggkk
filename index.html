      const { useState, useEffect, useRef } = React;

      // --- Sound Synthesizer via Web Audio API ---
      const audioCtxRef = { current: null };
      function initAudio() {
        if (!audioCtxRef.current) {
          audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
        }
      }

      function playSynthSound(type) {
        try {
          initAudio();
          const ctx = audioCtxRef.current;
          if (!ctx) return;
          if (ctx.state === 'suspended') ctx.resume();

          const now = ctx.currentTime;
          const masterGain = ctx.createGain();
          masterGain.gain.setValueAtTime(0.12, now);
          masterGain.connect(ctx.destination);

          if (type === 'click') {
            const osc = ctx.createOscillator();
            osc.frequency.setValueAtTime(600, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
            const gain = ctx.createGain();
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start(now);
            osc.stop(now + 0.1);
          } else if (type === 'select') {
            const osc = ctx.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.setValueAtTime(450, now + 0.08);
            const gain = ctx.createGain();
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start(now);
            osc.stop(now + 0.21);
          } else if (type === 'teleport') {
            const osc = ctx.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.25);
            const gain = ctx.createGain();
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start(now);
            osc.stop(now + 0.26);
          } else if (type === 'fire') {
            // Noise buffer simulation
            const bufferSize = ctx.sampleRate * 0.35;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
              data[i] = Math.random() * 2 - 1;
            }
            const noise = ctx.createBufferSource();
            noise.buffer = buffer;
            const filter = ctx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.setValueAtTime(800, now);
            filter.frequency.exponentialRampToValueAtTime(120, now + 0.35);
            const gain = ctx.createGain();
            gain.gain.setValueAtTime(0.4, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(masterGain);
            noise.start(now);
            noise.stop(now + 0.36);
          } else if (type === 'ice') {
            const osc = ctx.createOscillator();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(1800, now + 0.2);
            const gain = ctx.createGain();
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start(now);
            osc.stop(now + 0.21);
          } else if (type === 'heal') {
            const o1 = ctx.createOscillator();
            o1.type = 'sine';
            o1.frequency.setValueAtTime(260, now);
            o1.frequency.exponentialRampToValueAtTime(520, now + 0.4);
            const o2 = ctx.createOscillator();
            o2.type = 'sine';
            o2.frequency.setValueAtTime(320, now);
            o2.frequency.exponentialRampToValueAtTime(640, now + 0.4);
            const gain = ctx.createGain();
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            o1.connect(gain);
            o2.connect(gain);
            gain.connect(masterGain);
            o1.start(now);
            o2.start(now);
            o1.stop(now + 0.45);
            o2.stop(now + 0.45);
          } else if (type === 'lightning') {
            const osc = ctx.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.setValueAtTime(600, now + 0.05);
            osc.frequency.setValueAtTime(120, now + 0.1);
            const gain = ctx.createGain();
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start(now);
            osc.stop(now + 0.26);
          } else if (type === 'earth') {
            const osc = ctx.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(90, now);
            osc.frequency.exponentialRampToValueAtTime(40, now + 0.45);
            const gain = ctx.createGain();
            gain.gain.setValueAtTime(0.5, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.45);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start(now);
            osc.stop(now + 0.46);
          } else if (type === 'hit') {
            const osc = ctx.createOscillator();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(120, now);
            osc.frequency.exponentialRampToValueAtTime(30, now + 0.15);
            const gain = ctx.createGain();
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start(now);
            osc.stop(now + 0.16);
          } else if (type === 'ultimate') {
            const osc = ctx.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(80, now);
            osc.frequency.linearRampToValueAtTime(400, now + 0.8);
            const gain = ctx.createGain();
            gain.gain.setValueAtTime(0.4, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 1.2);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start(now);
            osc.stop(now + 1.21);
          }
        } catch (e) {
          console.warn('Audio Context block', e);
        }
      }

            { id: '3', username: 'GlacierPrism_Bot', win_count: 12 },
            { id: '4', username: 'Legend_AI', win_count: 22 }

        // Current active battle state
        const [isPlaying, setIsPlaying] = useState(false);
        const [matchWinner, setMatchWinner] = useState(null);
        const [winnerAlert, setWinnerAlert] = useState('');
        const [countdown, setCountdown] = useState(0);

        const canvasRef = useRef(null);
        const animationRef = useRef(null);

        // Save username helpers
        const handleRegister = (nameInput) => {
          const cleaned = nameInput.trim() || '플레이어';
          setUsername(cleaned);
          localStorage.setItem('stickman_name', cleaned);
          setIsEntered(true);
          playSynthSound('select');
        };

        const handleElementSelect = (id) => {
          playSynthSound('click');
          if (selectedElems.includes(id)) {
            if (selectedElems.length > 1) {
              setSelectedElems(selectedElems.filter(v => v !== id));
            }
          } else {
            if (selectedElems.length < 2) {
              setSelectedElems([...selectedElems, id]);
            } else {
              setSelectedElems([selectedElems[1], id]);
            }
          }
        };

        // Persistent leaderboard updating
        const recordVictory = (winnerName) => {
          let updated = [...leaderboard];
          const existIdx = updated.findIndex(u => u.username === winnerName);
          if (existIdx >= 0) {
            updated[existIdx].win_count += 1;
          } else {
            updated.push({ id: String(Date.now()), username: winnerName, win_count: 1 });
          }
          updated.sort((a,b) => b.win_count - a.win_count);
          setLeaderboard(updated);
          localStorage.setItem('stickman_leader', JSON.stringify(updated));
        };

        // --- BATTLE SIMULATION RIG ---
        const startBattle = () => {
          if (selectedElems.length !== 2) {
            alert('반드시 2가지 원소를 선택해야 융합 궁극기를 쓸 수 있습니다!');
            return;
          }
          initAudio();
          playSynthSound('select');
          setIsPlaying(true);
          setMatchWinner(null);
          setWinnerAlert('');
          setCountdown(3);
        };

        const currentFusion = getFusionSkill(selectedElems[0], selectedElems[1]);

        // Key states for movement
        const keysPressed = useRef({});
        useEffect(() => {
          const down = (e) => { keysPressed.current[e.key.toUpperCase()] = true; };
          const up = (e) => { keysPressed.current[e.key.toUpperCase()] = false; };
          window.addEventListener('keydown', down);
          window.addEventListener('keyup', up);
          return () => {
            window.removeEventListener('keydown', down);
            window.removeEventListener('keyup', up);
          };
        }, []);

        // Combat Engine Loop
        useEffect(() => {
          if (!isPlaying || countdown > 0) return;

          const canvas = canvasRef.current;
          if (!canvas) return;
          const ctx = canvas.getContext('2d');

          // Arena sizes
          const width = 1000;
          const height = 500;
          const floorY = 430;
          let screenShake = 0;

          // Game elements
          const p1 = {
            id: 'p1',
            name: username,
            x: 200, y: floorY, vx: 0, vy: 0,
            width: 30, height: 80,
            facingLeft: false,
            health: 100, maxHealth: 100,
            mana: 100, maxMana: 100,
            ultiGauge: 0,
            isJumping: false,
            stunned: 0, silenced: 0, blinded: 0, superArmor: 0, invisible: 0,
            shield: 0,
            cooldowns: { A: 0, S: 0, R: 0 }
          };

          // Bot elements determination
          const botElemChoices = ELEMENTS_LIST.map(e => e.id);
          const botE1 = botElemChoices[Math.floor(Math.random() * botElemChoices.length)];
          let botE2 = botElemChoices[Math.floor(Math.random() * botElemChoices.length)];
          while (botE1 === botE2) {
            botE2 = botElemChoices[Math.floor(Math.random() * botElemChoices.length)];
          }

          const p2 = {
            id: 'p2',
            name: gameMode === 'bot' ? `Bot_${botDiff.toUpperCase()}` : '플레이어2',
            x: 800, y: floorY, vx: 0, vy: 0,
            width: 30, height: 80,
            facingLeft: true,
            health: 100, maxHealth: 100,
            mana: 100, maxMana: 100,
            ultiGauge: 0,
            isJumping: false,
            stunned: 0, silenced: 0, blinded: 0, superArmor: 0, invisible: 0,
            shield: 0,
            cooldowns: { A: 0, S: 0, R: 0 }
          };

          const p1Elems = selectedElems;
          const p2Elems = [botE1, botE2];

          let projectiles = [];
          let groundTriggers = [];
          let floatingDamages = [];
          let particles = [];
          let matchTimer = 90;
          let frameCounter = 0;
          let lastTick = Date.now();
          let botAiState = { actionTimer: 0, targetX: 500 };

          // Laser/Beam animations cache
          let beamActive = null; // { owner, color, width, duration, type }

          function spawnSparks(x, y, color, count = 10, speed = 8) {
            for (let i = 0; i < count; i++) {
              const angle = Math.random() * Math.PI * 2;
              const spd = (0.2 + Math.random() * 0.8) * speed;
              particles.push({
                x, y,
                vx: Math.cos(angle) * spd,
                vy: Math.sin(angle) * spd,
                color,
                size: 2 + Math.random() * 4,
                alpha: 1,
                life: 300 + Math.random() * 400
              });
            }
          }

          function triggerDamage(attacker, defender, damage, element, type) {
            if (defender.invisible > 0) return;

            let actualDamage = damage;
            if (defender.shield > 0) {
              defender.shield = Math.max(0, defender.shield - actualDamage);
              actualDamage *= 0.3; // shield dampens 70%
            }
            if (defender.superArmor > 0) {
              actualDamage *= 0.7; // armor dampens 30%
            }

            // Apply special steam bypass
            if (type === 'steam') {
              actualDamage = damage; // ignores defenses completely!
            }

            defender.health = Math.max(0, defender.health - actualDamage);
            attacker.ultiGauge = Math.min(100, attacker.ultiGauge + 15);
            screenShake = Math.max(screenShake, actualDamage > 15 ? 12 : 6);

            floatingDamages.push({
              x: defender.x + (Math.random() - 0.5) * 40,
              y: defender.y - 60 - Math.random() * 20,
              text: type === 'heal' ? `+${Math.round(damage)}` : `${Math.round(actualDamage)}`,
              color: type === 'heal' ? '#22c55e' : (type === 'fusion' ? '#fb923c' : '#ffffff'),
              life: 800
            });

            // Inflict basic debuffs
            if (element === 'fire') {
              defender.health = Math.max(0, defender.health - 3); // burn impact
              spawnSparks(defender.x, defender.y - 40, '#ef4444', 12);
            } else if (element === 'ice') {
              defender.stunned = Math.max(defender.stunned, 1000); // short chill
              spawnSparks(defender.x, defender.y - 40, '#06b6d4', 8);
            } else if (element === 'lightning') {
              defender.stunned = Math.max(defender.stunned, 600); // micro shock stun
              spawnSparks(defender.x, defender.y - 40, '#eab308', 12);
            } else if (element === 'void') {
              defender.mana = Math.max(0, defender.mana - 15);
              attacker.mana = Math.min(attacker.maxMana, attacker.mana + 10);
            } else if (element === 'plant') {
              defender.stunned = Math.max(defender.stunned, 1200); // root lock
            }

            playSynthSound('hit');
          }

          // Spells Casting system
          function castSkillS1(caster, enemy, elem) {
            if (caster.silenced > 0 || caster.stunned > 0) return;
            if (caster.mana < 25) return;

            caster.mana -= 25;
            caster.cooldowns.A = 50; // frames CD
            const dir = caster.facingLeft ? -1 : 1;
            const shootX = caster.x + dir * 30;
            const shootY = caster.y - 45;

            if (elem === 'fire') {
              playSynthSound('fire');
              projectiles.push({
                x: shootX, y: shootY, vx: dir * 13, vy: 0,
                radius: 12, damage: 14, type: 'fire', color: '#ef4444',
                ownerId: caster.id, duration: 2500
              });
            } else if (elem === 'lightning') {
              // Blink Shock
              playSynthSound('teleport');
              caster.x = Math.max(50, Math.min(width - 50, caster.x + dir * 210));
              spawnSparks(caster.x, caster.y - 40, '#eab308', 15, 12);
              if (Math.abs(caster.x - enemy.x) < 120) {
                triggerDamage(caster, enemy, 10, 'lightning', 'blink');
              }
            } else if (elem === 'ice') {
              playSynthSound('ice');
              // Proz burst circles around caster
              spawnSparks(caster.x, caster.y - 45, '#22d3ee', 20, 7);
              if (Math.abs(caster.x - enemy.x) < 180) {
                enemy.stunned = Math.max(enemy.stunned, 1800); // Freeze!
                triggerDamage(caster, enemy, 6, 'ice', 'freeze');
              }
            } else if (elem === 'plant') {
              // Thorn root trap
              playSynthSound('click');
              groundTriggers.push({
                x: caster.x + dir * 140, y: floorY - 5, radius: 45,
                color: '#22c55e', type: 'trap', duration: 4000, ownerId: caster.id
              });
            } else if (elem === 'wind') {
              playSynthSound('teleport');
              // Wind blast knocks back
              spawnSparks(shootX, shootY, '#cbd5e1', 12, 10);
              if (Math.abs(caster.x - enemy.x) < 240) {
                enemy.x = Math.max(50, Math.min(width - 50, enemy.x + dir * 150));
                triggerDamage(caster, enemy, 8, 'wind', 'knockback');
              }
            } else if (elem === 'light') {
              playSynthSound('lightning');
              // Laser instantly hits full screen
              beamActive = { owner: caster.id, color: '#fef08a', width: 14, duration: 15, type: 'basic' };
              const beamDirY = Math.abs(caster.y - enemy.y) < 100;
              if (beamDirY && ((dir > 0 && enemy.x > caster.x) || (dir < 0 && enemy.x < caster.x))) {
                triggerDamage(caster, enemy, 15, 'light', 'laser');
              }
            } else if (elem === 'earth') {
              playSynthSound('earth');
              // Stone shielding
              caster.superArmor = 3000;
              caster.shield = Math.min(60, caster.shield + 40);
              spawnSparks(caster.x, caster.y - 40, '#b45309', 15);
            } else if (elem === 'void') {
              playSynthSound('ultimate');
              // Blackhole slow tracker
              projectiles.push({
                x: shootX, y: shootY, vx: dir * 7, vy: 0,
                radius: 20, damage: 12, type: 'void', color: '#a855f7',
                ownerId: caster.id, duration: 3000, behavior: 'blackhole'
              });
            }
          }

          function castSkillS2(caster, enemy, elem) {
            if (caster.silenced > 0 || caster.stunned > 0) return;
            if (caster.mana < 20) return;

            caster.mana -= 20;
            caster.cooldowns.S = 70; // frames CD
            const dir = caster.facingLeft ? -1 : 1;
            const shootX = caster.x + dir * 30;
            const shootY = caster.y - 45;

            if (elem === 'fire') {
              // Flame wall zone
              playSynthSound('fire');
              groundTriggers.push({
                x: caster.x + dir * 80, y: floorY - 5, radius: 75,
                color: '#ef4444', type: 'fire', duration: 3000, ownerId: caster.id
              });
            } else if (elem === 'lightning') {
              playSynthSound('lightning');
              // Discharge lightning outward
              spawnSparks(caster.x, caster.y - 45, '#facc15', 30, 14);
              if (Math.abs(caster.x - enemy.x) < 180) {
                triggerDamage(caster, enemy, 13, 'lightning', 'disch');
              }
            } else if (elem === 'ice') {
              playSynthSound('ice');
              // 3 Icicles rockets
              for (let i = -1; i <= 1; i++) {
                projectiles.push({
                  x: shootX, y: shootY + i * 20, vx: dir * 15, vy: i * 1.5,
                  radius: 8, damage: 8, type: 'ice', color: '#22d3ee',
                  ownerId: caster.id, duration: 2000
                });
              }
            } else if (elem === 'plant') {
              playSynthSound('heal');
              // Recover heal HP
              caster.health = Math.min(caster.maxHealth, caster.health + 15);
              spawnSparks(caster.x, caster.y - 45, '#4ade80', 15, 4);
              floatingDamages.push({ x: caster.x, y: caster.y - 70, text: '+15', color: '#4ade80', life: 800 });
            } else if (elem === 'wind') {
              playSynthSound('teleport');
              // Sky Jump
              caster.vy = -20;
              caster.isJumping = true;
              spawnSparks(caster.x, caster.y, '#94a3b8', 12, 6);
            } else if (elem === 'light') {
              playSynthSound('heal');
              // Luminous shield buffer
              caster.shield = Math.min(80, caster.shield + 50);
              spawnSparks(caster.x, caster.y - 45, '#fef08a', 20, 5);
            } else if (elem === 'earth') {
              playSynthSound('earth');
              // Rock rain overhead
              projectiles.push({
                x: enemy.x, y: 50, vx: 0, vy: 14,
                radius: 25, damage: 18, type: 'earth', color: '#854d0e',
                ownerId: caster.id, duration: 1500
              });
            } else if (elem === 'void') {
              playSynthSound('ultimate');
              // Mana drain siphoning
              if (Math.abs(caster.x - enemy.x) < 250) {
                enemy.mana = Math.max(0, enemy.mana - 35);
                caster.mana = Math.min(caster.maxMana, caster.mana + 30);
                spawnSparks(enemy.x, enemy.y - 40, '#d8b4fe', 12, 8);
                triggerDamage(caster, enemy, 8, 'void', 'drain');
              }
            }
          }

          function castUltimate(caster, enemy, elem1, elem2) {
            if (caster.ultiGauge < 100) return;
            caster.ultiGauge = 0;
            caster.cooldowns.R = 180; // massive ultimate safety frames CD
            playSynthSound('ultimate');

            const key = getFusionKey(elem1, elem2);
            screenShake = 22;

            // Apply different fusion ultimate mechanics and dynamic auras
            if (key.includes('fire') && key.includes('lightning')) {
              // Super Plasma Mega laser Beam
              beamActive = { owner: caster.id, color: '#f97316', width: 45, duration: 40, type: 'plasma' };
              triggerDamage(caster, enemy, 35, 'fire', 'fusion');
              enemy.stunned = Math.max(enemy.stunned, 1200);
            } else if (key.includes('fire') && key.includes('ice')) {
              // Steam Explosion
              triggerDamage(caster, enemy, 30, 'ice', 'steam');
              enemy.stunned = Math.max(enemy.stunned, 1500);
              spawnSparks(500, 250, '#f1f5f9', 70, 15);
            } else if (key.includes('fire') && key.includes('wind')) {
              // Hellfire Cyclone Hurricane
              projectiles.push({
                x: caster.x, y: floorY - 80, vx: (enemy.x > caster.x ? 1 : -1) * 7, vy: 0,
                radius: 65, damage: 28, type: 'fire', color: '#f43f5e',
                ownerId: caster.id, duration: 3500, behavior: 'cyclone'
              });
            } else if (key.includes('fire') && key.includes('earth')) {
              // Volcanic molten eruption
              groundTriggers.push({
                x: enemy.x, y: floorY - 5, radius: 110,
                color: '#ea580c', type: 'volcano', duration: 4500, ownerId: caster.id
              });
              triggerDamage(caster, enemy, 25, 'fire', 'fusion');
            } else if (key.includes('fire') && key.includes('light')) {
              // Solar blinding whiteout
              triggerDamage(caster, enemy, 22, 'light', 'solar_flare');
              enemy.blinded = 2500; // blinding screen
            } else if (key.includes('ice') && key.includes('lightning')) {
              // Super freeze freeze + shock blast
              enemy.stunned = Math.max(enemy.stunned, 3000); // 3 seconds freeze shock
              triggerDamage(caster, enemy, 25, 'ice', 'fusion');
              spawnSparks(enemy.x, enemy.y - 40, '#06b6d4', 40, 11);
            } else if (key.includes('plant') && key.includes('earth')) {
              // World tree roots and massive heal
              caster.health = Math.min(caster.maxHealth, caster.health + 35);
              triggerDamage(caster, enemy, 20, 'plant', 'fusion');
              spawnSparks(caster.x, caster.y - 40, '#22c55e', 25, 6);
            } else {
              // Default generic mighty burst
              triggerDamage(caster, enemy, 30, elem1, 'fusion');
              spawnSparks(enemy.x, enemy.y - 45, '#ffffff', 40, 13);
            }
          }

          // Game ticking engine
          const gameInterval = setInterval(() => {
            frameCounter++;
            const now = Date.now();
            const elapsed = now - lastTick;
            lastTick = now;

            // Timer countdown
            if (frameCounter % 30 === 0 && matchTimer > 0) {
              matchTimer--;
            }

            // Cool down decrease
            p1.stunned = Math.max(0, p1.stunned - elapsed);
            p1.silenced = Math.max(0, p1.silenced - elapsed);
            p1.blinded = Math.max(0, p1.blinded - elapsed);
            p2.stunned = Math.max(0, p2.stunned - elapsed);
            p2.silenced = Math.max(0, p2.silenced - elapsed);
            p2.blinded = Math.max(0, p2.blinded - elapsed);

            if (p1.cooldowns.A > 0) p1.cooldowns.A--;
            if (p1.cooldowns.S > 0) p1.cooldowns.S--;
            if (p1.cooldowns.R > 0) p1.cooldowns.R--;
            if (p2.cooldowns.A > 0) p2.cooldowns.A--;
            if (p2.cooldowns.S > 0) p2.cooldowns.S--;
            if (p2.cooldowns.R > 0) p2.cooldowns.R--;

            // Decay screen shake
            if (screenShake > 0) {
              screenShake *= 0.88;
              if (screenShake < 0.2) screenShake = 0;
            }

            // Passive resource recoveries
            p1.mana = Math.min(p1.maxMana, p1.mana + 0.4);
            p2.mana = Math.min(p2.maxMana, p2.mana + 0.4);

            // Leveling P1 controls & actions
            if (p1.stunned <= 0) {
              let moveDir1 = 0;
              if (keysPressed.current['A'] || keysPressed.current['ㅁ']) moveDir1 = -1;
              if (keysPressed.current['D'] || keysPressed.current['ㅇ']) moveDir1 = 1;

              p1.vx = moveDir1 * 7;
              if (moveDir1 !== 0) p1.facingLeft = moveDir1 < 0;

              if ((keysPressed.current['W'] || keysPressed.current['ㅈ']) && !p1.isJumping) {
                p1.vy = -16;
                p1.isJumping = true;
                playSynthSound('click');
              }

              // Casting triggers P1
              if (keysPressed.current['F'] || keysPressed.current['ㄹ']) {
                if (p1.cooldowns.A === 0) castSkillS1(p1, p2, p1Elems[0]);
              }
              if (keysPressed.current['G'] || keysPressed.current['ㅎ']) {
                if (p1.cooldowns.S === 0) castSkillS2(p1, p2, p1Elems[1]);
              }
              if (keysPressed.current['R'] || keysPressed.current['ㄱ']) {
                if (p1.cooldowns.R === 0 && p1.ultiGauge >= 100) castUltimate(p1, p2, p1Elems[0], p1Elems[1]);
              }
            } else {
              p1.vx = 0;
            }

            // Leveling Player 2 controls OR AI Bot Engine
            if (gameMode === 'pvp') {
              if (p2.stunned <= 0) {
                let moveDir2 = 0;
                if (keysPressed.current['ARROWLEFT']) moveDir2 = -1;
                if (keysPressed.current['ARROWRIGHT']) moveDir2 = 1;

                p2.vx = moveDir2 * 7;
                if (moveDir2 !== 0) p2.facingLeft = moveDir2 < 0;

                if (keysPressed.current['ARROWUP'] && !p2.isJumping) {
                  p2.vy = -16;
                  p2.isJumping = true;
                  playSynthSound('click');
                }

                if (keysPressed.current['K'] || keysPressed.current['ㅏ']) {
                  if (p2.cooldowns.A === 0) castSkillS1(p2, p1, p2Elems[0]);
                }
                if (keysPressed.current['L'] || keysPressed.current['ㅣ']) {
                  if (p2.cooldowns.S === 0) castSkillS2(p2, p1, p2Elems[1]);
                }
                if (keysPressed.current['O'] || keysPressed.current['ㅐ'] || keysPressed.current['P'] || keysPressed.current['ㅔ']) {
                  if (p2.cooldowns.R === 0 && p2.ultiGauge >= 100) castUltimate(p2, p1, p2Elems[0], p2Elems[1]);
                }
              } else {
                p2.vx = 0;
              }
            } else {
              // BOT AI engine calculations
              botAiState.actionTimer++;
              if (p2.stunned <= 0) {
                const decisionRate = botDiff === 'easy' ? 45 : (botDiff === 'medium' ? 25 : (botDiff === 'hard' ? 12 : 5));

                if (botAiState.actionTimer % decisionRate === 0) {
                  botAiState.targetX = p1.x + (Math.random() - 0.5) * 140;
                }

                // AI Follow path
                if (Math.abs(p2.x - botAiState.targetX) > 40) {
                  p2.vx = p2.x < botAiState.targetX ? 5.5 : -5.5;
                  p2.facingLeft = p2.vx < 0;
                } else {
                  p2.vx = 0;
                }

                // Dodging jumping mechanism
                const incomingProj = projectiles.find(p => p.ownerId === 'p1' && Math.abs(p.x - p2.x) < 180);
                if (incomingProj && !p2.isJumping && Math.random() < 0.6) {
                  p2.vy = -15;
                  p2.isJumping = true;
                  playSynthSound('click');
                }

                // Cast spells bots intelligently
                if (botAiState.actionTimer % decisionRate === 0) {
                  if (p2.ultiGauge >= 100 && p2.cooldowns.R === 0) {
                    castUltimate(p2, p1, p2Elems[0], p2Elems[1]);
                  } else if (p2.mana >= 25 && p2.cooldowns.A === 0 && Math.random() < 0.7) {
                    // cast S1
                    castSkillS1(p2, p1, p2Elems[0]);
                  } else if (p2.mana >= 20 && p2.cooldowns.S === 0 && Math.random() < 0.45) {
                    // cast S2
                    castSkillS2(p2, p1, p2Elems[1]);
                  }
                }
              } else {
                p2.vx = 0;
              }
            }

            // Gravity implementations
            p1.vy += 0.8;
            p1.x += p1.vx;
            p1.y += p1.vy;
            if (p1.y >= floorY) {
              p1.y = floorY;
              p1.vy = 0;
              p1.isJumping = false;
            }

            p2.vy += 0.8;
            p2.x += p2.vx;
            p2.y += p2.vy;
            if (p2.y >= floorY) {
              p2.y = floorY;
              p2.vy = 0;
              p2.isJumping = false;
            }

            // Keep players in bounds
            p1.x = Math.max(30, Math.min(width - 30, p1.x));
            p2.x = Math.max(30, Math.min(width - 30, p2.x));

            // Upkeep active beam timer
            if (beamActive) {
              beamActive.duration--;
              if (beamActive.duration <= 0) {
                beamActive = null;
              }
            }

            // Update projectiles
            projectiles.forEach(proj => {
              proj.x += proj.vx;
              proj.y += proj.vy;
              proj.duration -= 33;

              // Check cyclone behaviors
              if (proj.behavior === 'cyclone') {
                proj.radius = Math.min(100, proj.radius + 0.8);
                // continuously drag enemy
                const opp = proj.ownerId === 'p1' ? p2 : p1;
                if (Math.abs(proj.x - opp.x) < proj.radius + 30) {
                  opp.x += proj.vx * 0.4;
                  opp.y = Math.max(100, opp.y - 12); // float up!
                  opp.isJumping = true;
                  triggerDamage(proj.ownerId === 'p1' ? p1 : p2, opp, 1.2, 'fire', 'cyclone');
                }
              }

              // Hit detection
              const defender = proj.ownerId === 'p1' ? p2 : p1;
              const attacker = proj.ownerId === 'p1' ? p1 : p2;
              const dist = Math.sqrt((proj.x - defender.x) ** 2 + (proj.y - defender.y + 40) ** 2);

              if (dist < proj.radius + 25) {
                proj.duration = 0;
                triggerDamage(attacker, defender, proj.damage, proj.type, 'projectile');
              }
            });
            projectiles = projectiles.filter(p => p.duration > 0);

            // Update ground traps & triggers
            groundTriggers.forEach(trig => {
              trig.duration -= 33;
              const defender = trig.ownerId === 'p1' ? p2 : p1;
              const attacker = trig.ownerId === 'p1' ? p1 : p2;

              if (trig.type === 'trap') {
                if (Math.abs(defender.x - trig.x) < trig.radius && defender.y >= floorY - 10) {
                  trig.duration = 0; // consumed
                  defender.stunned = 1500; // heavy snared
                  triggerDamage(attacker, defender, 10, 'plant', 'trap_snare');
                }
              } else if (trig.type === 'fire') {
                if (Math.abs(defender.x - trig.x) < trig.radius && defender.y >= floorY - 30) {
                  triggerDamage(attacker, defender, 0.45, 'fire', 'lava_dot');
                }
              } else if (trig.type === 'volcano') {
                if (Math.abs(defender.x - trig.x) < trig.radius && defender.y >= floorY - 30) {
                  triggerDamage(attacker, defender, 1.1, 'fire', 'molten');
                  defender.vx += defender.x < trig.x ? -2 : 2; // push away
                }
              }
            });
            groundTriggers = groundTriggers.filter(t => t.duration > 0);

            // Update floating damages
            floatingDamages.forEach(d => {
              d.y -= 0.8;
              d.life -= 15;
            });
            floatingDamages = floatingDamages.filter(d => d.life > 0);

            // Update particles
            particles.forEach(p => {
              p.x += p.vx;
              p.y += p.vy;
              p.alpha *= 0.94;
              p.life -= 16;
            });
            particles = particles.filter(p => p.life > 0);

            // Victory & Round Loss checks
            if (p1.health <= 0 || p2.health <= 0 || matchTimer <= 0) {
              clearInterval(gameInterval);
              cancelAnimationFrame(animationRef.current);
              setIsPlaying(false);

              let winResult = null;
              if (p1.health <= 0 && p2.health <= 0) {
                setWinnerAlert('🤝 절묘한 동시 KO! 무승부입니다.');
              } else if (p1.health <= 0) {
                winResult = p2.name;
                setWinnerAlert(`💀 패배... 승리자는 ${p2.name} 입니다.`);
                recordVictory(p2.name);
              } else if (p2.health <= 0) {
                winResult = p1.name;
                setWinnerAlert(`🏆 축하합니다! ${p1.name}가 승리했습니다!`);
                recordVictory(p1.name);
              } else {
                // Timeout logic
                if (p1.health > p2.health) {
                  winResult = p1.name;
                  setWinnerAlert(`⏱️ 시간 초과! 체력이 높은 ${p1.name}가 승리했습니다!`);
                  recordVictory(p1.name);
                } else if (p2.health > p1.health) {
                  winResult = p2.name;
                  setWinnerAlert(`⏱️ 시간 초과! 체력이 높은 ${p2.name}가 승리했습니다!`);
                  recordVictory(p2.name);
                } else {
                  setWinnerAlert('⏱️ 시간 초과! 박빙의 무승부입니다.');
                }
              }
              setMatchWinner(winResult);
              playSynthSound('victory');
            }

            // --- CANVAS RENDER ENGINE ---
            ctx.clearRect(0, 0, width, height);
            ctx.save();

            // Apply camera shake translations
            if (screenShake > 0) {
              const dx = (Math.random() - 0.5) * screenShake;
              const dy = (Math.random() - 0.5) * screenShake;
              ctx.translate(dx, dy);
            }

            // Draw grid backdrop
            ctx.strokeStyle = '#0f172a';
            ctx.lineWidth = 1;
            for (let x = 0; x < width; x += 50) {
              ctx.beginPath();
              ctx.moveTo(x, 0);
              ctx.lineTo(x, height);
              ctx.stroke();
            }
            for (let y = 0; y < height; y += 50) {
              ctx.beginPath();
              ctx.moveTo(0, y);
              ctx.lineTo(width, y);
              ctx.stroke();
            }

            // Draw metallic arena ground
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, floorY, width, height - floorY);
            ctx.fillStyle = '#38bdf8';
            ctx.fillRect(0, floorY, width, 4); // glowing floor line

            // Draw ground dangers/traps
            groundTriggers.forEach(trig => {
              ctx.beginPath();
              ctx.arc(trig.x, trig.y, trig.radius, 0, Math.PI * 2);
              if (trig.type === 'trap') {
                ctx.strokeStyle = trig.color;
                ctx.lineWidth = 3;
                ctx.stroke();
                // spikes inside
                for (let a = 0; a < Math.PI * 2; a += 0.5) {
                  ctx.beginPath();
                  ctx.moveTo(trig.x, trig.y);
                  ctx.lineTo(trig.x + Math.cos(a) * trig.radius, trig.y - Math.abs(Math.sin(a)) * 15);
                  ctx.strokeStyle = '#22c55e';
                  ctx.stroke();
                }
              } else {
                ctx.fillStyle = trig.type === 'volcano' ? 'rgba(234, 88, 12, 0.4)' : 'rgba(239, 68, 68, 0.3)';
                ctx.fill();
                ctx.strokeStyle = trig.color;
                ctx.stroke();
              }
            });

            // Draw projectiles
            projectiles.forEach(proj => {
              ctx.beginPath();
              ctx.arc(proj.x, proj.y, proj.radius, 0, Math.PI * 2);
              ctx.fillStyle = proj.color;
              ctx.shadowColor = proj.color;
              ctx.shadowBlur = 15;
              ctx.fill();
              ctx.shadowBlur = 0; // reset
            });

            // Draw lasers
            if (beamActive) {
              ctx.strokeStyle = beamActive.color;
              ctx.lineWidth = beamActive.width;
              ctx.lineCap = 'round';
              ctx.shadowColor = beamActive.color;
              ctx.shadowBlur = 20;

              const beamY = floorY - 45;
              ctx.beginPath();
              ctx.moveTo(0, beamY);
              ctx.lineTo(width, beamY);
              ctx.stroke();
              ctx.shadowBlur = 0;
            }

            // Draw physical stickman assets
            function drawStickman(player, colorCode) {
              if (player.invisible > 0) return;

              ctx.strokeStyle = colorCode;
              ctx.lineWidth = 4.5;
              ctx.lineCap = 'round';

              const x = player.x;
              const y = player.y;

              // Draw energy aura shield
              if (player.shield > 0) {
                ctx.strokeStyle = 'rgba(56, 189, 248, 0.55)';
                ctx.beginPath();
                ctx.arc(x, y - 40, 50, 0, Math.PI * 2);
                ctx.stroke();
              }

              // Earth stone defense aura
              if (player.superArmor > 0) {
                ctx.strokeStyle = '#b45309';
                ctx.beginPath();
                ctx.arc(x, y - 40, 45, 0, Math.PI * 2);
                ctx.lineWidth = 2;
                ctx.stroke();
              }

              // Stun / Freeze visual encapsulation
              if (player.stunned > 0) {
                ctx.fillStyle = 'rgba(6, 182, 212, 0.4)';
                ctx.fillRect(x - 25, y - 85, 50, 85);
                ctx.strokeStyle = '#06b6d4';
                ctx.strokeRect(x - 25, y - 85, 50, 85);
              }

              ctx.strokeStyle = player.stunned > 0 ? '#67e8f9' : colorCode;
              ctx.lineWidth = 4;

              // 1. HEAD
              ctx.beginPath();
              ctx.arc(x, y - 70, 10, 0, Math.PI * 2);
              ctx.stroke();

              // 2. SPINE BODY
              ctx.beginPath();
              ctx.moveTo(x, y - 60);
              ctx.lineTo(x, y - 30);
              ctx.stroke();

              // 3. ARMS
              const rightArmAngle = player.vx !== 0 ? Math.sin(frameCounter * 0.3) * 0.5 : 0;
              ctx.beginPath();
              ctx.moveTo(x, y - 50);
              // Left arm
              ctx.lineTo(x - 15, y - 40 + rightArmAngle * 10);
              ctx.stroke();

              ctx.beginPath();
              ctx.moveTo(x, y - 50);
              // Right arm holding weapon
              ctx.lineTo(x + 15, y - 40 - rightArmAngle * 10);
              ctx.stroke();

              // 4. LEGS
              const legAngle = Math.sin(frameCounter * 0.3) * 20;
              ctx.beginPath();
              ctx.moveTo(x, y - 30);
              ctx.lineTo(x - 12 + (player.vx !== 0 ? legAngle : 0) * 0.5, y);
              ctx.stroke();

              ctx.beginPath();
              ctx.moveTo(x, y - 30);
              ctx.lineTo(x + 12 - (player.vx !== 0 ? legAngle : 0) * 0.5, y);
              ctx.stroke();

              // Dynamic Nametags
              ctx.fillStyle = '#f8fafc';
              ctx.font = 'bold 12px sans-serif';
              ctx.textAlign = 'center';
              ctx.fillText(player.name, x, y - 90);
            }

            drawStickman(p1, '#ef4444'); // Red P1
            drawStickman(p2, '#3b82f6'); // Blue P2

            // Draw particles systems
            particles.forEach(p => {
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
              ctx.fillStyle = p.color;
              ctx.globalAlpha = p.alpha;
              ctx.fill();
              ctx.globalAlpha = 1.0;
            });

            // Draw damage texts
            floatingDamages.forEach(d => {
              ctx.fillStyle = d.color;
              ctx.font = 'black 16px sans-serif';
              ctx.fillText(d.text, d.x, d.y);
            });

            ctx.restore();

            // Display in-app variables synchronized states
            document.getElementById('timer-val').innerText = matchTimer;
            document.getElementById('p1-hp').style.width = `${p1.health}%`;
            document.getElementById('p2-hp').style.width = `${p2.health}%`;
            document.getElementById('p1-mp').style.width = `${p1.mana}%`;
            document.getElementById('p2-mp').style.width = `${p2.mana}%`;
            document.getElementById('p1-ult').style.width = `${p1.ultiGauge}%`;
            document.getElementById('p2-ult').style.width = `${p2.ultiGauge}%`;

          }, 33);

          return () => {
            clearInterval(gameInterval);
            cancelAnimationFrame(animationRef.current);
          };
        }, [isPlaying, countdown]);

        // Countdown timer process
        useEffect(() => {
          if (isPlaying && countdown > 0) {
            const tim = setTimeout(() => {
              setCountdown(countdown - 1);
              if (countdown === 1) {
                playSynthSound('teleport');
              } else {
                playSynthSound('click');
              }
            }, 1000);
            return () => clearTimeout(tim);
          }
        }, [isPlaying, countdown]);

        return (
          <div className="min-h-screen bg-slate-950 text-slate-100 flex flex-col justify-between">
            {/* --- HEADER BAR --- */}
            <header className="border-b border-slate-900 bg-slate-950/85 backdrop-blur px-6 py-4 flex items-center justify-between sticky top-0 z-40">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center font-black text-xl tracking-tight shadow-md select-none animate-pulse">⚡</div>
                <div>
                  <h1 className="font-extrabold tracking-tight text-lg text-white">Stickman Element Duel</h1>
                  <p className="text-xs text-slate-400 font-mono">1vs1 Real-time Battle Arena</p>
                </div>
              </div>

              <div className="flex items-center gap-4">
                <button 
                  onClick={() => { playSynthSound('click'); setShowControlsInfo(true); }}
                  className="bg-slate-905 border border-slate-800 hover:border-slate-700 active:bg-slate-900 text-xs px-3 py-1.5 rounded-lg font-medium transition cursor-pointer flex items-center gap-1.5"
                >
                  ⌨️ 조작키 보기
                </button>
                <button 
                  onClick={() => { playSynthSound('click'); setShowingSQL(true); }}
                  className="bg-slate-905 border border-slate-800 hover:border-slate-700 active:bg-slate-900 text-xs px-3 py-1.5 rounded-lg font-medium text-cyan-400 transition cursor-pointer flex items-center gap-1.5"
                >
                  🗄️ Supabase DDL
                </button>
              </div>
            </header>

            {/* --- CORE GAME/LOBBY INTERFACE --- */}
            <main className="flex-1 flex flex-col items-center justify-center p-4">
              {!isEntered ? (
                /* --- NICKNAME REGISTRATION MODAL --- */
                <div className="w-full max-w-md bg-slate-900/60 border border-slate-800 p-8 rounded-2xl shadow-2xl backdrop-blur-lg flex flex-col gap-6 text-center">
                  <div>
                    <span className="text-4xl">⚔️</span>
                    <h2 className="text-2xl font-black mt-2 bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">스틱맨 원소대전 입장</h2>
                    <p className="text-slate-450 text-sm mt-1">도트형 물리 스틱맨 결투 전장에 이름을 등록하세요.</p>
                  </div>

                  <div className="flex flex-col gap-2 text-left">
                    <label className="text-xs font-semibold text-slate-400 font-mono">NICKNAME (아이디)</label>
                    <input 
                      type="text" 
                      id="name-input"
                      placeholder="내 닉네임 입력 (예: 불꽃전사)" 
                      className="bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 text-sm focus:outline-none focus:border-cyan-500 transition font-medium"
                      onKeyDown={(e) => {
                        if (e.key === 'Enter') {
                          handleRegister(e.target.value);
                        }
                      }}
                    />
                  </div>

                  <button 
                    onClick={() => {
                      const val = document.getElementById('name-input').value;
                      handleRegister(val);
                    }}
                    className="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:opacity-90 py-3 rounded-xl font-bold tracking-wider text-sm transition cursor-pointer shadow-lg shadow-sky-600/10"
                  >
                    등록 및 결투 시작
                  </button>
                </div>
              ) : !isPlaying ? (
                /* --- MAIN MENU AND CHAR SELECT SELECTION --- */
                <div className="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
                  
                  {/* LEFT: CHARACTER SETUP & ELEMENTS */}
                  <div className="lg:col-span-8 flex flex-col gap-6">
                    <div className="bg-slate-900/50 border border-slate-800/80 p-6 rounded-2xl backdrop-blur">
                      <div className="flex items-center justify-between mb-4">
                        <div>
                          <h3 className="font-extrabold text-lg text-white flex items-center gap-2">
                            <span>🎭</span>원소 선택 (2가지 원소 고르기)
                          </h3>
                          <p className="text-xs text-slate-450">고른 두 원소의 조합에 따라 고유의 궁극기 스킬이 무조건 변환 생성됩니다.</p>
                        </div>
                        <span className="text-xs font-mono bg-cyan-950 text-cyan-400 px-3 py-1 rounded-full font-bold border border-cyan-800 animate-pulse">
                          {selectedElems.length} / 2 선택함
                        </span>
                      </div>

                      {/* Element picking grid */}
                      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                        {ELEMENTS_LIST.map((elem) => {
                          const isSel = selectedElems.includes(elem.id);
                          return (
                            <button
                              key={elem.id}
                              onClick={() => handleElementSelect(elem.id)}
                              className={`p-4 rounded-xl border text-left flex flex-col justify-between h-32 transition relative cursor-pointer group ${
                                isSel 
                                  ? `bg-gradient-to-br ${elem.gradient} border-white/60 shadow-lg shadow-sky-500/5Scales scale-[1.02]` 
                                  : 'bg-slate-950 border-slate-850 hover:border-slate-700 hover:scale-[1.01]'
                              }`}
                            >
                              <div className="flex justify-between w-full items-center">
                                <span className="text-2xl">{elem.emoji}</span>
                                {isSel && <span className="text-xs font-mono bg-black/60 px-2 py-0.5 rounded text-white font-bold">ACTIVE</span>}
                              </div>
                              <div>
                                <span className={`text-sm font-bold block ${isSel ? 'text-white' : 'text-slate-200'}`}>{elem.name}</span>
                                <span className={`text-[10px] sm:text-[11px] leading-tight ${isSel ? 'text-white/80' : 'text-slate-400'} mt-1 block`}>
                                  A: {elem.skills.s1.name}
                                </span>
                              </div>
                            </button>
                          );
                        })}
                      </div>

                      {/* Dynamically updated Fusion skill panel */}
                      <div className="mt-5 p-4 rounded-xl bg-slate-950/90 border border-slate-800 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                        <div className="flex items-center gap-4">
                          <div className="w-12 h-12 rounded-xl flex items-center justify-center font-bold text-2xl select-none" style={{ backgroundColor: `${currentFusion.color}25`, border: `2px solid ${currentFusion.color}` }}>
                            🌟
                          </div>
                          <div>
                            <span className="text-[10px] font-mono text-cyan-400 uppercase tracking-widest font-black">ACTIVE FUSION ULTIMATE</span>
                            <h4 className="font-bold text-slate-100 text-base">{currentFusion.name}</h4>
                            <p className="text-xs text-slate-400 mt-1">{currentFusion.effect}</p>
                          </div>
                        </div>
                        <div className="text-right">
                          <span className="text-xs text-slate-400 font-mono">시전 단축키</span>
                          <kbd className="block font-mono bg-slate-800 px-3 py-1 rounded text-xs text-white border border-slate-700 mt-1 text-center font-bold shadow-sm">
                            [ R ] or [ P ] (게이지 100% 충전시)
                          </kbd>
                        </div>
                      </div>
                    </div>

                    {/* MATCH SETTINGS & FIGHT STARTER */}
                    <div className="bg-slate-900/50 border border-slate-800 p-6 rounded-2xl flex flex-col sm:flex-row items-center justify-between gap-6 backdrop-blur">
                      <div className="w-full sm:w-auto flex flex-col gap-3">
                        <span className="text-xs font-mono text-slate-400 tracking-wider font-extrabold uppercase select-none">BATTLE MODE CONFIG</span>
                        <div className="flex gap-2">
                          <button 
                            onClick={() => { playSynthSound('click'); setGameMode('bot'); }}
                            className={`flex-1 sm:flex-initial px-4 py-2.5 rounded-xl text-xs font-bold transition cursor-pointer border ${
                              gameMode === 'bot' 
                                ? 'bg-cyan-500 text-slate-950 border-cyan-400 shadow-md' 
                                : 'bg-slate-950 text-slate-350 border-slate-850 hover:border-slate-800'
                            }`}
                          >
                            🤖 컴퓨터 대전 (AI)
                          </button>
                          <button 
                            onClick={() => { playSynthSound('click'); setGameMode('pvp'); }}
                            className={`flex-1 sm:flex-initial px-4 py-2.5 rounded-xl text-xs font-bold transition cursor-pointer border ${
                              gameMode === 'pvp' 
                                ? 'bg-cyan-500 text-slate-950 border-cyan-400 shadow-md' 
                                : 'bg-slate-950 text-slate-350 border-slate-850 hover:border-slate-800'
                            }`}
                          >
                            ⚔️ 2인 주말 대전 (PVP)
                          </button>
                        </div>

                        {gameMode === 'bot' && (
                          <div className="flex items-center gap-1.5 mt-1 bg-slate-950 border border-slate-850 p-1.5 rounded-lg">
                            <span className="text-[10px] font-mono text-slate-400 px-2">나이도 :</span>
                            {['easy', 'medium', 'hard', 'legend'].map((diff) => (
                              <button
                                key={diff}
                                onClick={() => { playSynthSound('click'); setBotDiff(diff); }}
                                className={`text-[10px] font-bold uppercase py-1 px-2.5 rounded transition cursor-pointer ${
                                  botDiff === diff 
                                    ? 'bg-slate-800 text-cyan-400 border border-cyan-800/80' 
                                    : 'text-slate-400 hover:text-white'
                                }`}
                              >
                                {diff}
                              </button>
                            ))}
                          </div>
                        )}
                      </div>

                      <button 
                        onClick={startBattle}
                        className="w-full sm:w-auto px-8 py-4 bg-gradient-to-r from-red-500 to-amber-500 hover:opacity-90 active:scale-95 text-slate-950 font-black rounded-2xl tracking-wider text-base transition cursor-pointer shadow-lg shadow-amber-600/20"
                      >
                        입장 및 현장 격투 시작! 🔥
                      </button>
                    </div>

                    {/* LOBBY WINNER DIALOG POPUP */}
                    {winnerAlert && (
                      <div className="p-5 rounded-2xl bg-slate-900 border border-cyan-800 shadow-2xl flex flex-col sm:flex-row items-center justify-between gap-4 animate-bounce">
                        <div className="flex items-center gap-4">
                          <span className="text-3xl">🏆</span>
                          <div>
                            <h4 className="font-bold text-white text-base">결투 완료 정보</h4>
                            <p className="text-xs text-slate-300 mt-0.5">{winnerAlert}</p>
                          </div>
                        </div>
                        <button 
                          onClick={() => { playSynthSound('click'); setWinnerAlert(''); }}
                          className="bg-slate-800 border border-slate-700 hover:border-slate-600 text-xs text-slate-300 px-3 py-1.5 rounded-lg font-bold transition"
                        >
                          확인 및 알림 닫기
                        </button>
                      </div>
                    )}
                  </div>

                  {/* RIGHT: LEADERBOARD COLUMN */}
                  <div className="lg:col-span-4 bg-slate-900/50 border border-slate-800 p-6 rounded-2xl backdrop-blur h-full">
                    <h3 className="font-extrabold text-md text-white flex items-center gap-2 mb-4 select-none">
                      <span>🏆</span>실시간 로컬 랭킹보드
                    </h3>
                    <p className="text-xs text-slate-450 leading-relaxed mb-4">
                      Vercel 단일 파일 내에서도 플레이 성과가 브라우저 DB(<code className="bg-slate-950 text-cyan-400 px-1 py-0.5 rounded font-mono">localStorage</code>)에 자동 지속 저축되어 다음 방문 시점까지 통계 랭킹이 박제 유지됩니다.
                    </p>

                    <div className="flex flex-col gap-2 max-h-80 overflow-y-auto custom-scroll pr-1">
                      {leaderboard.map((item, idx) => (
                        <div 
                          key={item.id || idx} 
                          className={`flex items-center justify-between p-3 rounded-xl border transition ${
                            item.username === username 
                              ? 'bg-cyan-950/25 border-cyan-800 shadow-md shadow-sky-950/5' 
                              : 'bg-slate-950/60 border-slate-850 hover:bg-slate-950'
                          }`}
                        >
                          <div className="flex items-center gap-3">
                            <span className="text-xs font-mono font-bold w-5 text-center text-slate-450">
                              {idx + 1 === 1 ? '🥇' : (idx + 1 === 2 ? '🥈' : (idx + 1 === 3 ? '🥉' : idx + 1))}
                            </span>
                            <span className="font-bold text-slate-200 text-xs tracking-tight">{item.username}</span>
                            {item.username === username && <span className="text-[9px] font-mono bg-cyan-900/60 text-cyan-400 px-1.5 py-0.5 rounded font-bold uppercase">ME</span>}
                          </div>
                          <span className="text-xs font-mono text-cyan-400 font-bold bg-cyan-950/80 px-2 py-1 rounded-md border border-cyan-900/60 flex items-center gap-1 select-none">
                            🏁 {item.win_count}승
                          </span>
                        </div>
                      ))}
                    </div>

                    <div className="mt-5 pt-4 border-t border-slate-850 flex items-center justify-between text-[11px] text-slate-400 font-mono">
                      <span>👤 등록자 : {username}</span>
                      <button 
                        onClick={() => {
                          const conf = confirm('등록을 취소하고 이름을 새로 수정 등록하시겠습니까?');
                          if (conf) {
                            localStorage.removeItem('stickman_name');
                            setIsEntered(false);
                            playSynthSound('select');
                          }
                        }}
                        className="text-cyan-500 hover:underline cursor-pointer"
                      >
                        이름 변경
                      </button>
                    </div>
                  </div>
                </div>
              ) : (
                /* --- LIVE ARENA FIGHTING STAGE --- */
                <div className="w-full max-w-5xl flex flex-col gap-4">
                  
                  {/* HERO STICKMAN HUD INDICATORS */}
                  <div className="grid grid-cols-12 gap-4 items-center">
                    {/* PLAYER 1 STATS BOX */}
                    <div className="col-span-5 bg-slate-900/60 border border-slate-850 p-4 rounded-2xl">
                      <div className="flex justify-between items-center mb-1">
                        <span className="text-xs font-mono font-extrabold text-red-400 truncate w-32">🔴 P1. {username}</span>
                        <div className="flex gap-1.5">
                          {selectedElems.map(id => {
                            const detail = ELEMENTS_LIST.find(e => e.id === id);
                            return <span key={id} className="text-xs" title={detail.name}>{detail.emoji}</span>;
                          })}
                        </div>
                      </div>
                      
                      {/* HEALTH METER BAR */}
                      <span className="text-[10px] text-slate-450 block text-right">HP (체력)</span>
                      <div className="w-full h-3 bg-slate-950 rounded-full overflow-hidden border border-slate-850 mb-2">
                        <div id="p1-hp" className="h-full bg-gradient-to-r from-red-500 to-rose-600 transition-all duration-75" style={{ width: '100%' }}></div>
                      </div>

                      {/* MANA BAR METER */}
                      <span className="text-[10px] text-slate-450 block text-right">MANA (마나)</span>
                      <div className="w-full h-2 bg-slate-950 rounded-full overflow-hidden border border-slate-850 mb-2">
                        <div id="p1-mp" className="h-full bg-gradient-to-r from-cyan-400 to-blue-505 transition-all duration-75" style={{ width: '100%' }}></div>
                      </div>

                      {/* ULTIMATE GAUGE */}
                      <span className="text-[10px] text-slate-450 block text-right">ULTIMATE GAUGE (궁극기 퓨전)</span>
                      <div className="w-full h-1.5 bg-slate-950 rounded-full overflow-hidden border border-slate-850">
                        <div id="p1-ult" className="h-full bg-gradient-to-r from-amber-400 to-orange-500 transition-all duration-75" style={{ width: '0%' }}></div>
                      </div>
                    </div>

                    {/* TIMER CENTRAL GAUGE */}
                    <div className="col-span-2 text-center flex flex-col items-center justify-center bg-slate-950 border border-slate-850 h-full py-4 rounded-xl shadow-md">
                      <span className="text-[10px] font-mono text-slate-450 tracking-wider">TIME LEFT</span>
                      <span id="timer-val" className="text-2xl font-black font-mono text-white tracking-widest mt-0.5">90</span>
                      <span className="text-[10px] font-mono bg-cyan-950 text-cyan-400 px-2 py-0.5 rounded mt-2 border border-cyan-900 font-bold">
                        {gameMode === 'bot' ? 'VS CO' : 'PVP LOCAL'}
                      </span>
                    </div>

                    {/* PLAYER 2 / BOT STATS BOX */}
                    <div className="col-span-5 bg-slate-900/60 border border-slate-850 p-4 rounded-2xl">
                      <div className="flex justify-between items-center mb-1">
                        <span className="text-xs font-mono font-extrabold text-blue-400 truncate w-32">🔵 P2. {gameMode === 'bot' ? `Bot_${botDiff.toUpperCase()}` : '플레이어2'}</span>
                        <span className="text-xs">🤖 Elemental Power</span>
                      </div>
                      
                      {/* HEALTH METER BAR */}
                      <span className="text-[10px] text-slate-450 block text-right">HP (체력)</span>
                      <div className="w-full h-3 bg-slate-950 rounded-full overflow-hidden border border-slate-850 mb-2">
                        <div id="p2-hp" className="h-full bg-gradient-to-r from-blue-500 to-cyan-600 transition-all duration-75" style={{ width: '100%' }}></div>
                      </div>

                      {/* MANA BAR METER */}
                      <span className="text-[10px] text-slate-450 block text-right">MANA (마나)</span>
                      <div className="w-full h-2 bg-slate-950 rounded-full overflow-hidden border border-slate-850 mb-2">
                        <div id="p2-mp" className="h-full bg-gradient-to-r from-cyan-400 to-blue-505 transition-all duration-75" style={{ width: '100%' }}></div>
                      </div>

                      {/* ULTIMATE GAUGE */}
                      <span className="text-[10px] text-slate-450 block text-right">ULTIMATE GAUGE (궁극기 퓨전)</span>
                      <div className="w-full h-1.5 bg-slate-950 rounded-full overflow-hidden border border-slate-850">
                        <div id="p2-ult" className="h-full bg-gradient-to-r from-amber-400 to-orange-500 transition-all duration-75" style={{ width: '0%' }}></div>
                      </div>
                    </div>
                  </div>

                  {/* ACTIVE BATTLE CANVAS WRAPPER */}
                  <div className="relative bg-slate-950 rounded-2xl overflow-hidden border border-slate-800 shadow-2xl neon-glow">
                    {/* COUNTDOWN TEXT SCREEN OVERLAYS */}
                    {countdown > 0 && (
                      <div className="absolute inset-x-0 inset-y-0 bg-slate-950/80 flex flex-col items-center justify-center z-20">
                        <span className="text-6xl font-black text-white tracking-widest animate-ping font-mono">{countdown}</span>
                        <span className="text-slate-400 text-sm mt-3 uppercase tracking-widest font-mono">가장 가까운 결투가 곧 선언됩니다</span>
                      </div>
                    )}

                    {/* DIRECT CANVAS ELEMENT INJECT */}
                    <canvas 
                      ref={canvasRef} 
                      width="1000" 
                      height="500" 
                      className="w-full object-contain"
                    />

                    {/* LEAVE BATTLE TRIGGERS */}
                    <div className="absolute top-4 right-4 flex gap-2 z-10">
                      <button 
                        onClick={() => {
                          const leave = confirm('정말 전장에서 철수하고 대기실로 퇴각하시겠습니까? (현재 판은 기권 처리됩니다)');
                          if (leave) {
                            setIsPlaying(false);
                            playSynthSound('select');
                          }
                        }}
                        className="bg-red-950/80 hover:bg-red-900 text-red-400 border border-red-900/60 text-xs px-3 py-1.5 rounded-lg transition cursor-pointer font-bold"
                      >
                        🏳️ 기권하기 (기권패)
                      </button>
                    </div>
                  </div>

                  {/* INTERFACE QUICK CONTROLS MAP DISPLAY */}
                  <div className="p-4 bg-slate-900/40 border border-slate-850 rounded-xl grid grid-cols-2 gap-4 text-xs font-mono">
                    <div>
                      <span className="text-red-400 font-extrabold block mb-1">🔴 플레이어 1 조작 (W/A/D)</span>
                      <span>이동/점프: A, D / W | 스킬1: <b>[ F ]</b> | 스킬2: <b>[ G ]</b> | 궁극기 퓨전: <b>[ R ]</b></span>
                    </div>
                    <div>
                      {gameMode === 'pvp' ? (
                        <>
                          <span className="text-blue-400 font-extrabold block mb-1">🔵 플레이어 2 조작 (방향키)</span>
                          <span>이동/점프: ◀ , ▶ / ▲ | 스킬1: <b>[ K ]</b> | 스킬2: <b>[ L ]</b> | 궁극기 퓨전: <b>[ O or P ]</b></span>
                        </>
                      ) : (
                        <>
                          <span className="text-yellow-400 font-extrabold block mb-1">🤖 컴퓨터 AI 전담 마킹</span>
                          <span>봇이 자동으로 이동하고 내 투사체를 피하며 궁극기 원소 융합 콤보를 시전합니다.</span>
                        </>
                      )}
                    </div>
                  </div>

                </div>
              )}
            </main>

            {/* --- LEADERBOARD & INTERACTION FOOTER --- */}
            <footer className="border-t border-slate-900 bg-slate-950/90 py-5 text-center px-4">
              <p className="text-xs text-slate-400 font-medium">
                Stickman Element Duel © 2026. Designed for smooth instant copy-paste, editable development & zero-dependency static Vercel hosting.
              </p>
            </footer>

            {/* --- SUPABASE SQL SCHEMA DDL VIEWER POPUP MODAL --- */}
            {showingSQL && (
              <div className="fixed inset-0 bg-slate-950/95 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="w-full max-w-2xl bg-slate-900 rounded-2xl border border-slate-800 p-6 shadow-2xl flex flex-col justify-between h-[80vh]">
                  <div className="flex items-center justify-between border-b border-slate-800 pb-3 mb-4 select-none">
                    <h3 className="text-md font-extrabold text-white flex items-center gap-2">
                      <span>🗄️</span> Supabase / PostgreSQL DDL 원천 쿼리
                    </h3>
                    <button 
                      onClick={() => { playSynthSound('click'); setShowingSQL(false); }}
                      className="text-slate-400 hover:text-white text-lg transition font-mono border border-slate-800 hover:bg-slate-800 px-2 rounded-lg"
                    >
                      X
                    </button>
                  </div>
                  
                  <div className="flex-1 overflow-y-auto mb-4 custom-scroll">
                    <p className="text-xs text-slate-400 mb-2 leading-relaxed">
                      이 게임의 전적 및 대전방 관리를 위해 PostgreSQL/Supabase 및 다른 SQL DB에 바로 집어넣을 수 있는 DDL 원천 물리 스키마 쿼리 세트입니다.
                    </p>
                    <pre className="p-4 bg-slate-950 text-slate-300 font-mono text-xs rounded-xl overflow-x-auto border border-slate-850 leading-relaxed max-h-96">
                      {LEADER_SQL_SCHEMA}
                    </pre>
                  </div>

                  <div className="flex gap-2 justify-end">
                    <button 
                      onClick={() => {
                        navigator.clipboard.writeText(LEADER_SQL_SCHEMA);
                        playSynthSound('select');
                        alert('DDL 스키마가 클립보드에 무사 복사되었습니다! Supabase SQL Editor에 편히 붙여넣어 활용하세요.');
                      }}
                      className="bg-cyan-500 text-slate-950 hover:bg-cyan-400 px-4 py-2 text-xs font-black rounded-lg transition"
                    >
                      📋 SQL 클립보드 전체 복사
                    </button>
                    <button 
                      onClick={() => { playSynthSound('click'); setShowingSQL(false); }}
                      className="bg-slate-800 text-slate-300 hover:text-white hover:bg-slate-700 px-4 py-2 text-xs font-bold rounded-lg transition"
                    >
                      창 닫기
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* --- CONTROLS INFO POPUP MODAL --- */}
            {showControlsInfo && (
              <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="w-full max-w-lg bg-slate-900 rounded-2xl border border-slate-850 p-6 shadow-2xl">
                  <div className="flex items-center justify-between border-b border-slate-800 pb-3 mb-4 select-none">
                    <h3 className="text-md font-extrabold text-white flex items-center gap-2">
                      <span>⌨️</span> 결투 액션 조작법 가이드
                    </h3>
                    <button 
                      onClick={() => { playSynthSound('click'); setShowControlsInfo(false); }}
                      className="text-slate-440 hover:text-white text-lg transition font-mono border border-slate-800 hover:bg-slate-800 px-2 rounded-lg"
                    >
                      X
                    </button>
                  </div>

                  <div className="space-y-4 text-xs leading-relaxed text-slate-300">
                    <div>
                      <span className="text-slate-200 font-bold block mb-1">🔴 플레이어 1 (좌측 스틱맨)</span>
                      <div className="grid grid-cols-3 gap-2 text-center bg-slate-950 p-2.5 rounded-lg border border-slate-850 font-mono text-[11px]">
                        <div><b>A / D</b> (좌우이동)</div>
                        <div><b>W</b> (점프하기)</div>
                        <div><b>F</b> (기본 스킬1)</div>
                        <div><b>G</b> (보조 스킬2)</div>
                        <div><b>R</b> (융합 필살기)</div>
                      </div>
                    </div>

                    <div>
                      <span className="text-slate-200 font-bold block mb-1">🔵 플레이어 2 (우측 스틱맨)</span>
                      <div className="grid grid-cols-3 gap-2 text-center bg-slate-950 p-2.5 rounded-lg border border-slate-850 font-mono text-[11px]">
                        <div><b>◀ / ▶</b> (좌우이동)</div>
                        <div><b>▲</b> (점프하기)</div>
                        <div><b>K</b> (기본 스킬1)</div>
                        <div><b>L</b> (보조 스킬2)</div>
                        <div><b>O or P</b> (융합 필살기)</div>
                      </div>
                    </div>

                    <div className="bg-slate-950 p-3 rounded-lg border border-slate-850/80 text-[11px]">
                      💡 <b>궁극의 퓨전 필살기 시전법:</b> 적에게 대미지를 가하면 원형 Ultimate 게이지가 자동으로 회전 충전되며, 100% 한계에 봉착했을 때 키보드 단번에 [ R ] or [ P ]를 누르면 전장을 파괴하는 대형 fusion 필살기가 방사 시전됩니다!
                    </div>
                  </div>

                  <div className="flex justify-end mt-5">
                    <button 
                      onClick={() => { playSynthSound('click'); setShowControlsInfo(false); }}
                      className="bg-slate-800 hover:bg-slate-700 text-slate-350 hover:text-white px-5 py-2 text-xs font-bold rounded-lg transition"
                    >
                      가이드 닫기
                    </button>
                  </div>
                </div>
              </div>
            )}

          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
